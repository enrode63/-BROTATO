name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Godot version — must match export template folder inside the CI image and
# the "4.3" feature tag in project.godot. Bump all three together.
env:
  GODOT_VERSION: "4.3"

permissions:
  contents: write

jobs:
  build:
    name: Export HTML5
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install export templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable

      - name: Import assets
        run: godot --headless --import

      - name: Export Web build
        run: |
          mkdir -v -p build/web
          godot --headless --export-release "Web" build/web/index.html

      # --- rounds (온라인 대전) 프로젝트를 /rounds/ 하위로 함께 빌드 ---
      - name: Import rounds assets
        run: |
          cd rounds
          godot --headless --import

      - name: Export rounds Web build
        run: |
          mkdir -v -p build/web/rounds
          cd rounds
          godot --headless --export-release "Web" ../build/web/rounds/index.html

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web

  deploy:
    name: Publish to gh-pages branch
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: build/web

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web
